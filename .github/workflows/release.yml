name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Initial version to publish; must match package.json
        required: true
        default: 0.1.0
        type: string

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Create or update release pull request
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  bootstrap:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.bootstrap.outputs.created }}
      version: ${{ steps.bootstrap.outputs.version }}
      tag: ${{ steps.bootstrap.outputs.tag }}
      sha: ${{ steps.bootstrap.outputs.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create initial GitHub release
        id: bootstrap
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          node -e "const p=require('./package.json'); if(p.version!==process.env.VERSION) throw new Error('package.json version '+p.version+' does not match '+process.env.VERSION)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be plain semantic versioning without a v prefix" >&2
            exit 1
          fi
          tag="v${VERSION}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --target "$GITHUB_SHA" --title "$tag" --generate-notes
          fi
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

  publish:
    needs: [release-please, bootstrap]
    if: >-
      always() &&
      (needs.release-please.outputs.created == 'true' || needs.bootstrap.outputs.created == 'true')
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/swilcox/kdrama-graph
      VERSION: ${{ needs.release-please.outputs.version || needs.bootstrap.outputs.version }}
      RELEASE_TAG: ${{ needs.release-please.outputs.tag || needs.bootstrap.outputs.tag }}
      RELEASE_SHA: ${{ needs.release-please.outputs.sha || needs.bootstrap.outputs.sha }}
    steps:
      - name: Check out released revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release-please.outputs.sha || needs.bootstrap.outputs.sha }}

      - name: Derive release channels
        id: version
        shell: bash
        run: |
          set -euo pipefail
          IFS=. read -r major minor patch <<< "$VERSION"
          echo "minor=${major}.${minor}" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ steps.version.outputs.major != '0' }}
            type=raw,value=latest
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Scene Map
            org.opencontainers.image.description=A local-first K-drama and Korean film journal
            org.opencontainers.image.licenses=MIT

      - name: Build and publish image
        id: image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            VERSION=${{ env.VERSION }}
            REVISION=${{ env.RELEASE_SHA }}
            CREATED=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release

      - name: Attest published image
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

      - name: Attach deployment bundle
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          staging="scene-map-deployment"
          versioned="scene-map-${VERSION}.tar.gz"
          mkdir "$staging"
          cp compose.yaml .env.example "$staging/"
          tar -C "$staging" -czf "$versioned" .
          cp "$versioned" scene-map-compose.tar.gz
          gh release upload "$RELEASE_TAG" "$versioned" scene-map-compose.tar.gz --clobber
